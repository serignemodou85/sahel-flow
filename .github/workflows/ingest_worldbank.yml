name: Ingest World Bank → Supabase

on:
  schedule:
    - cron: "0 6 1 * *"   # 1er de chaque mois à 06h00 UTC
  workflow_dispatch:       # déclenchement manuel depuis GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run World Bank ingestion
        env:
          DATABASE_URL_OVERRIDE: ${{ secrets.DATABASE_URL_OVERRIDE }}
        run: python infra/supabase/ingest_worldbank.py
