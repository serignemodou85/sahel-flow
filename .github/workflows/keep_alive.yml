name: Keep-alive — API Render

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping API health
        run: |
          curl -s --max-time 60 --retry 3 --retry-delay 15 --retry-all-errors \
            -o /dev/null -w "HTTP %{http_code}\n" \
            ${{ secrets.API_BASE_URL }}/v1/health
