repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8

# ── Notes ────────────────────────────────────────────────────────────────────
# black (formatter) : délibérément absent.
# Activer black sur un projet existant génère un diff de reformatage massif
# qui noie l'historique git. Préférable de l'activer dès le début d'un nouveau
# projet. Non bloquant — ajouter quand le moment est choisi consciemment.
