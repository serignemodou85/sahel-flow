apiVersion: 1

# Prometheus s'ajoute comme deuxième datasource Grafana.
# uid fixe "prometheus" — référencé dans api_performance.json.
# TimescaleDB reste la datasource par défaut (isDefault: true dans timescaledb.yml).
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090   # "prometheus" = nom du service Docker sur sahel_net
    access: proxy
    isDefault: false
    jsonData:
      timeInterval: '15s'        # aligné sur scrape_interval dans prometheus.yml
      httpMethod: POST
    editable: false
