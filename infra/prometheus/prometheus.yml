global:
  scrape_interval: 15s       # collecte les métriques toutes les 15 secondes
  evaluation_interval: 15s   # évalue les règles d'alerte toutes les 15 secondes

scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI sahel-flow — endpoint /metrics exposé par prometheus-fastapi-instrumentator
  # "api" = nom du service Docker sur sahel_net, résolu automatiquement
  - job_name: 'sahel-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
